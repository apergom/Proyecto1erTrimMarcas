    <main>
        <section class="tracker-section">
            <form class="tracker-form">
                <input type="text" id="title" placeholder="Title" required>
                <select id="category" required>
                    <option value="">Select Category</option>
                    <option value="category1">Category 1</option>
                    <option value="category2">Category 2</option>
                </select>
                <select id="status" required>
                    <option value="">Select Status</option>
                    <option value="new">New</option>
                    <option value="in-progress">In Progress</option>
                </select>
                <textarea id="description" placeholder="Description" required></textarea>
                <button type="submit">Add Item</button>
                <div class="validation-messages"></div>
            </form>
            <div class="filter-bar">
                <input type="text" id="search" placeholder="Search..."><select id="filter-category"></select><select id="filter-status"></select>
            </div>
            <div id="item-list" class="tracker-list"></div>
        </section>
    </main>
