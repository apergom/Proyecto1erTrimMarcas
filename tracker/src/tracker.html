    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/tracker.js" defer></script>
    <script src="../assets/js/script.js" defer></script>
    <script src="../assets/js/theme.js" defer></script>
</head>
<body>
<header class="header">
    <a href="index.html">
        <img class="header__logo" src="../assets/img/uklogo.png" alt="logo"/>
    </a>
    <h1 class="header__title">UltraWiki</h1>
    <nav class="navigator-header">
        <ul class="navigator-header__ul">
            <li class="navigator-header__item"><a class="navigator-header__link" href="services.html">Services</a></li>

        </ul>
    </nav>
    <button type="button" id="dark-toggle" class="dark-toggle">Modo oscuro</button>
</header>
    <main>
        <section class="tracker-section">
            <form class="tracker-form">
                <input type="text" id="title" placeholder="Title" required>
                <select id="category" required>
                    <option value="">Select Category</option>
                    <option value="category1">Category 1</option>
                    <option value="category2">Category 2</option>
                </select>
                <select id="status" required>
                    <option value="">Select Status</option>
                    <option value="new">New</option>
                    <option value="in-progress">In Progress</option>
                </select>
                <textarea id="description" placeholder="Description" required></textarea>
                <button type="submit">Add Item</button>
                <div class="validation-messages"></div>
            </form>
            <div class="filter-bar">
                <input type="text" id="search" placeholder="Search..."><select id="filter-category"></select><select id="filter-status"></select>
            </div>
            <div id="item-list" class="tracker-list"></div>
        </section>
    </main>
